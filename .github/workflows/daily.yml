name: Joyun Daily Intelligence

on:
  schedule:
    # 7:00 AM IST = 1:30 AM UTC
    - cron: "30 1 * * *"
  workflow_dispatch:  # allow manual trigger

permissions:
  contents: write  # so the job can commit results back to the repo

jobs:
  intel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run intelligence research
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/run_intel.py

      - name: Send to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/send_telegram.py

      - name: Commit results back to repo
        run: |
          git config user.name "joyun-intel-bot"
          git config user.email "bot@joyun.local"
          git add data/ dashboard.html
          git diff --cached --quiet || git commit -m "Daily intel: $(date -u +%Y-%m-%d)"
          git push
